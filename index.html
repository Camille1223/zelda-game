<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta property="og:title" content="勇者三试炼 🎮">
  <meta property="og:description" content="三关闯关游戏，通关解锁迪士尼公主庆典！">
  <title>勇者三试炼 🎮</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlay-content"></div>
    </div>
    <!-- 第一关触屏按钮 -->
    <div id="touch-controls" class="hidden">
      <div id="btn-left"  class="touch-btn">◀</div>
      <div id="btn-jump"  class="touch-btn jump-btn">跳</div>
      <div id="btn-right" class="touch-btn">▶</div>
    </div>
  </div>

  <script>
    window.GAME_API_BASE = 'https://zelda-game-production.up.railway.app';
  </script>
  <script src="assets.js"></script>
  <script src="ui.js"></script>
  <script src="level1.js"></script>
  <script src="level2.js"></script>
  <script src="level3.js"></script>
  <script src="main.js"></script>
</body>
</html>
